<!DOCTYPE html>
<html>
<head>
  <title>StudyMeter</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

<!-- HEADER -->
<div class="header">
  <div class="logo">📊 StudyMeter</div>

  <div style="display:flex; gap:10px; align-items:center;">
    <div class="user" id="username">Welcome</div>
    <button onclick="resetData()">Reset</button>
    <button onclick="logout()">Logout</button>
  </div>
</div>

<div class="container">
  <h2>Track Your Study Time</h2>

  <input id="subject" placeholder="Enter Subject">
  <input id="hours" type="number" placeholder="Enter Hours">

  <button onclick="addStudy()">Add Study</button>

  <h3>📅 Study History</h3>

  <!-- ONLY FILTER CALENDAR -->
  <input type="date" id="filterDate" onchange="filterByDate()">

  <div id="data">No data found</div>

  <div style="display:flex; gap:10px; justify-content:center; margin:15px 0;">
    <button onclick="showToday()">Today</button>
    <button onclick="showWeek()">Weekly</button>
    <button onclick="showMonth()">Monthly</button>
  </div>

  <canvas id="chart"></canvas>
</div>

<script src="script.js"></script>

<script>
  let user = localStorage.getItem("currentUser");
  if(user){
    document.getElementById("username").innerText = "Welcome, " + user;
  }
</script>

</body>
</html>
