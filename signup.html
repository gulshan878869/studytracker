<!DOCTYPE html>
<html>
<head>
  <title>Signup - StudyMeter</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
  <h2>Create Account 🚀</h2>

  <input id="newUser" type="text" placeholder="Username">
  
  <div class="password-box">
    <input id="newPass" type="password" placeholder="Password">
    <span onclick="togglePass()">👁️</span>
  </div>

  <button onclick="signup()">Signup</button>

  <p>Already have an account? <a href="login.html">Login</a></p>
</div>

<script>
function signup() {
  let user = document.getElementById("newUser").value.trim();
  let pass = document.getElementById("newPass").value.trim();

  if (!user || !pass) return alert("Fill all fields");

  if (localStorage.getItem(user)) return alert("User exists");

  localStorage.setItem(user, pass);
  alert("Account Created ✅");
  window.location.href = "login.html";
}

function togglePass(){
  let p = document.getElementById("newPass");
  p.type = p.type === "password" ? "text" : "password";
}
</script>

</body>
</html>
